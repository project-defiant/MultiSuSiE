name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Run Ruff
        run: ruff check .

      - name: Run Black
        run: black --check .

      - name: Run tests
        run: pytest -q
